name: Static Code Analysis

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  detekt:
    name: Detekt Analysis
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - uses: actions/checkout@v4

      # 2. Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Cache Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. Ensure Detekt reports directory exists
      - name: Check if Detekt reports directory exists
        run: |
          if [ ! -d "build/reports/detekt" ]; then
            echo "Detekt reports directory does not exist. Creating it..."
            mkdir -p build/reports/detekt
          else
            echo "Detekt reports directory exists."
          fi

      # 5. Run Detekt (don't fail on issues)
      - name: Run Detekt
        run: ./gradlew detekt

      # 6. List Detekt report files for debugging
      - name: List contents of Detekt reports directory
        run: |
          echo "Listing contents of build/reports/detekt:"
          ls -R build/reports/detekt || echo "No reports found."

      # 7. Upload Detekt Report (if available)
      - name: Upload Detekt Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: build/reports/detekt/
          if-no-files-found: warn

  lint:
    name: Android Lint Analysis
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - uses: actions/checkout@v4

      # 2. Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Cache Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. Ensure Android Lint reports directory exists
      - name: Check if Lint reports directory exists
        run: |
          if [ ! -d "build/reports/lint" ]; then
            echo "Lint reports directory does not exist. Creating it..."
            mkdir -p build/reports/lint
          else
            echo "Lint reports directory exists."
          fi

      # 5. Run Android Lint
      - name: Run Android Lint
        run: ./gradlew lint

      # 6. List Lint report files for debugging
      - name: List contents of Lint reports directory
        run: |
          echo "Listing contents of build/reports/lint:"
          ls -R build/reports/lint || echo "No reports found."

      # 7. Upload Android Lint Report (if available)
      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: build/reports/lint/
          if-no-files-found: warn

  danger:
    name: Run Danger for Detekt and Lint Comments
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - uses: actions/checkout@v4

      # 2. Set up Ruby
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'

      # 3. Install Ruby dependencies
      - name: Install Ruby dependencies
        run: |
          echo "source 'https://rubygems.org'" > Gemfile
          echo "gem 'danger'" >> Gemfile
          echo "gem 'nokogiri'" >> Gemfile
          bundle install

      # 4. Run Danger to post Detekt and Lint comments
      - name: Run Danger for Inline Comments
        run: bundle exec danger
        env:
          DANGER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
